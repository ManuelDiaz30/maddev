<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Contato | MadDev Studio</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <main class="contact-page">
            <section class="panel contact-panel">
                <h2>Entre em contato</h2>
                <p>Preencha os campos abaixo e eu retorno em breve.</p>

                <form class="contact-form" action="https://formsubmit.co/ajax/maddev3005@gmail.com" method="POST">
                    <input type="hidden" name="_subject" value="Nova mensagem pelo portfólio">
                    <input type="hidden" name="_captcha" value="false">
                    <input type="hidden" name="_template" value="table">
                    <div class="contact-form__row">
                        <div class="field">
                            <label for="nome">Nome</label>
                            <input id="nome" name="nome" type="text" placeholder="Seu nome" value="" required>
                        </div>

                        <div class="field">
                            <label for="telefone">Telefone</label>
                            <input id="telefone" name="telefone" type="tel" placeholder="(11) 99999-9999" value="" required>
                        </div>
                    </div>

                    <div class="field field--full">
                        <label for="email">Email</label>
                        <input id="email" name="email" type="email" placeholder="seuemail@exemplo.com" required>
                    </div>

                    <div class="field field--full">
                        <label for="motivo">Motivo do contato</label>
                        <textarea id="motivo" name="motivo" rows="5" placeholder="Conte-me mais sobre o que você precisa" required></textarea>
                    </div>

                    <button type="submit">Enviar mensagem</button>
                </form>

                <div class="social-links">
                    <a href="index.html">Voltar ao portfólio</a>
                </div>
            </section>
        </main>
    </body>
</html>
